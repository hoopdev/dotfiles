# Generated from the Nix config by: nix run .#export-dotfiles — do not edit by hand.
format = "[░▒▓](#e0eaf5)[  ](bg:#e0eaf5 fg:#1e2433)[](bg:#e8c87a fg:#e0eaf5)$directory[](fg:#e8c87a bg:#8ac4a0)$git_branch$git_status[](fg:#8ac4a0 bg:#70d0e8)$time[ ](fg:#70d0e8)$character"
palette = "base16"

[directory]
format = "[ $path ]($style)"
style = "fg:#272d3f bg:#e8c87a"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
