[package]
name = "dev-core"
version = "0.1.0"
edition = "2021"
description = "Shared types and task store for the dev CLI ecosystem"

[features]
default = []
watch = ["dep:notify"]
git = ["dep:git2"]
config = ["dep:toml"]
windows = ["config"]
wasm = []

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"

[dependencies.toml]
version = "0.8"
optional = true

[dependencies.notify]
version = "6"
optional = true

[dependencies.git2]
version = "0.19"
optional = true
default-features = false
features = ["vendored-libgit2"]
