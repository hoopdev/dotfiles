[package]
name = "dev-cli"
version = "0.1.0"
edition = "2021"
description = "dev CLI — Rust implementation replacing the bash script in coder.nix"

[[bin]]
name = "dev"
path = "src/main.rs"

[dependencies]
dev-core = { path = "../dev-core", features = ["git"] }
serde_json = "1"
tokio = { version = "1", features = ["rt-multi-thread", "process", "macros", "time"] }
