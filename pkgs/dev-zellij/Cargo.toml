[package]
name = "dev-zellij"
version = "0.1.0"
edition = "2021"
description = "Zellij plugin for dev task orchestration"

[lib]
name = "dev_zellij"
crate-type = ["cdylib"]
path = "src/lib.rs"

[dependencies]
dev-core = { path = "../dev-core", default-features = false, features = ["wasm"] }
zellij-tile = "0.41"
serde_json = "1"
