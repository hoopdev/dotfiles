[package]
name = "dev-tui"
version = "0.1.0"
edition = "2021"
description = "Live fleet TUI for the dev CLI — consumes `dev ps/status/logs --json` on a background thread, shells out to dev for actions."

[[bin]]
name = "dev-tui"
path = "src/main.rs"

[dependencies]
ratatui = "0.29"
crossterm = "0.28"
serde_json = "1"

[profile.release]
opt-level = "z"
lto = true
strip = true
